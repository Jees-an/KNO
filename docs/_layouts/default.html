<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
  <nav class="top-nav">
    <a href="{{ '/' | relative_url }}" class="nav-logo">🔭 K-NOVA: 한국어 신어 관측 시스템</a>
    <button class="nav-hamburger" id="navHamburger" aria-label="메뉴 열기" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}">홈</a>
      <a href="{{ '/reports/' | relative_url }}">신어 관측 보고</a>
      <a href="{{ '/data.html' | relative_url }}">신어별 관측 데이터</a>
      <a href="{{ '/about/' | relative_url }}">프로젝트 소개</a>
      <a href="https://github.com/Jees-an/K-NOVA" target="_blank">GitHub</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} K-NOVA · Korean Neologism Observatory and Visual Analytics</p>
  </footer>
  <script>
  (function() {
    var btn = document.getElementById('navHamburger');
    if (!btn) return;
    var nav = btn.nextElementSibling;
    btn.addEventListener('click', function() {
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      btn.classList.toggle('active');
      nav.classList.toggle('nav-open');
    });
    nav.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        btn.setAttribute('aria-expanded', 'false');
        btn.classList.remove('active');
        nav.classList.remove('nav-open');
      });
    });
  })();
  </script>
</body>
</html>
