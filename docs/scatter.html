    ctx.beginPath();
    ctx.moveTo(xS.left, yS.getPixelForValue(0));
    ctx.lineTo(xS.right, yS.getPixelForValue(0));
    ctx.stroke();
    // OLS
    ctx.setLineDash([]);
    ctx.strokeStyle = '#E24B4A';
    ctx.lineWidth = 2;
    const x0 = xS.min, x1 = xS.max;
    ctx.beginPath();
    ctx.moveTo(xS.getPixelForValue(x0), yS.getPixelForValue(SLOPE*x0+INTERCEPT));
    ctx.lineTo(xS.getPixelForValue(x1), yS.getPixelForValue(SLOPE*x1+INTERCEPT));
    ctx.stroke();
    ctx.restore();
  }
};

// label plugin
const labelPlugin = {
  id: 'scatterLabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    ctx.save();
    const placed = [];
    const items = [];

    RAW.forEach(d => {
      if (!LABELS.has(d.name)) return;
      const ds = chart.data.datasets.find(ds2 => ds2.label === d.cat);
      if (!ds || ds.hidden) return;
      const dsIdx = chart.data.datasets.indexOf(ds);
      const ptIdx = ds.data.findIndex(p => p._meta.name === d.name);
      if (ptIdx < 0) return;
      const meta = chart.getDatasetMeta(dsIdx);
      const pt = meta.data[ptIdx];
      if (!pt) return;
      items.push({ name: d.name, px: pt.x, py: pt.y, y: d.y });
    });
    items.sort((a, b) => b.y - a.y);

    ctx.font = '500 14px Pretendard, system-ui, sans-serif';

    items.forEach(item => {
      const tw = ctx.measureText(item.name).width;
      const bw = tw + 12, bh = 24;
      const dirs = [
        [1,-1],[1,0],[1,1],[2,-1],[2,0],[2,1],
        [-1,-1],[-1,0],[-1,1],[-2,-1],[-2,0],[-2,1],
        [0,-2],[0,2],[3,0],[-3,0]
      ];
      let bestX = null, bestY = null;
      for (const [dx, dy] of dirs) {
        const cx = item.px + dx * 24;
        const cy = item.py + dy * 20;
        const r = { l: cx - bw/2, t: cy - bh/2, r: cx + bw/2, b: cy + bh/2 };
        if (r.l < chart.chartArea.left || r.t < chart.chartArea.top ||
            r.r > chart.chartArea.right || r.b > chart.chartArea.bottom) continue;
        const overlap = placed.some(p =>
          !(r.r < p.l - 2 || r.l > p.r + 2 || r.b < p.t - 2 || r.t > p.b + 2));
        if (!overlap) { bestX = cx; bestY = cy; placed.push(r); break; }
      }
      if (bestX === null) return;

      // leader line
      ctx.beginPath();
      ctx.moveTo(item.px, item.py);
      ctx.lineTo(bestX, bestY);
      ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // box
      const bx = bestX - bw/2, by = bestY - bh/2;
      ctx.fillStyle = labelBg;
      ctx.strokeStyle = labelBorder;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 4);
      ctx.fill();
      ctx.stroke();

      // text
      ctx.fillStyle = labelTextColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.name, bestX, bestY);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('chart'), {
  type: 'scatter',
  data: { datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600 },
    scales: {
      x: {
        title: { display:true, text:'사용자 범위 (log\u2081\u2080 화자 수)', font:{ size:14, weight:'bold' }, color:tickColor },
        min: -0.3, max: 4.8,
        ticks: {
          callback: v => ({0:'1',1:'10',2:'100',3:'1K',4:'10K'})[v] || '',
          color: tickColor, font: { size: 13 },
        },
        grid: { color: gridColor },
      },
      y: {
        title: { display:true, text:'사용자당 반복 강도 (log\u2081\u2080 화자당 빈도)', font:{ size:14, weight:'bold' }, color:tickColor },
        min: -0.05, max: 0.72,
        ticks: {
          callback: v => v === 0 ? '1.0x' : (Math.pow(10,v)).toFixed(1)+'x',
          stepSize: 0.1, color: tickColor, font: { size: 12 },
        },
        grid: { color: gridColor },
      },
    },
    plugins: {
      tooltip: {
        callbacks: {
          label: ctx => {
            const d = ctx.raw._meta;
            const pos = d.y > (SLOPE*d.x+INTERCEPT) ? '\u25B2 회귀선 위' : '\u25BC 회귀선 아래';
            return [
              d.name + ' (' + d.cat + ')',
              '빈도: ' + d.freq.toLocaleString() + '  |  화자: ' + d.speakers.toLocaleString(),
              '화자당 ' + d.ratio.toFixed(2) + '회  |  ' + pos,
            ];
          },
        },
        bodyFont: { size: 13 },
        titleFont: { size: 0 },
        displayColors: false,
        padding: 12,
        cornerRadius: 6,
        backgroundColor: isDark ? 'rgba(40,40,40,0.95)' : 'rgba(255,255,255,0.97)',
        bodyColor: isDark ? '#e8e8e4' : '#1a1a1a',
        borderColor: isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)',
        borderWidth: 1,
      },
      legend: {
        position: 'bottom',
        labels: {
          font: { size: 12.5 },
          usePointStyle: true,
          pointStyle: 'circle',
          padding: 16,
          color: tickColor,
        },
      },
    },
  },
  plugins: [regressionPlugin, labelPlugin],
});
</script>
